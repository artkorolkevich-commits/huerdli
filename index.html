<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Хуердли</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Хуердли</h1>
        <p class="subtitle" id="subtitle">Загрузка…</p>
      </header>

      <main>
        <div id="board" class="board" aria-live="polite"></div>
        <p id="message" class="message" role="status"></p>
        <button id="share-btn" type="button" class="share-btn hidden">Поделиться результатом</button>
        <div id="keyboard" class="keyboard"></div>
      </main>

      <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-card">
          <h2 id="modal-title"></h2>
          <p id="modal-text"></p>
          <div id="modal-share-block" class="share-block hidden">
            <pre id="modal-share-preview" class="share-preview" aria-hidden="true"></pre>
            <p class="share-link-label">Ссылка на игру</p>
            <a
              id="modal-share-link"
              class="share-link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
            <div class="modal-actions modal-actions--share">
              <button id="modal-share" type="button">Скопировать результат</button>
              <button id="modal-telegram" type="button" class="telegram">Отправить в Telegram</button>
              <button id="modal-btn" type="button" class="secondary">Понятно</button>
            </div>
          </div>
        </div>
      </div>

      <div id="age-gate" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-card">
          <h2>Контент 18+</h2>
          <p>Сегодня слово из матового словаря. Продолжая, подтверждаете, что вам 18 лет.</p>
          <div class="modal-actions">
            <button id="age-yes" type="button">Мне есть 18</button>
            <button id="age-no" type="button" class="secondary">Выйти</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
